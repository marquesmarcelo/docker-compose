version: "3.9"

services:
  #  agent-gateway:
  #    build:
  #      context: ./agent-gateway
  #    container_name: agent-gateway
  #    restart: always
  #    depends_on:
  #      - ollama
  #      - alloydb
  #      - mcp-hub
  #      - n8n
  #    environment:
  #      OLLAMA_URL: http://ollama:11434
  #      MCP_URL: http://mcp-hub:8000
  #      N8N_URL: http://n8n:5678
  #      N8N_WEBHOOK: http://n8n:5678/webhook/agent
  #      DATABASE_URL: "postgresql://agent:agent123@alloydb:5432/agentdb"
  #      MODEL_NAME: qwen2.5:3b
  #    ports:
  #      - "8091:8000"

  # =========================
  # Uma API Fake para testes
  # =========================
  fake_api:
    build: ./fake_api
    container_name: fake_api
    depends_on:
      - alloydb
    ports:
      - "8081:8000"

  # =========================
  # MCP para interagir com a API Fake
  # =========================
  mcp_test:
    build: ./mcp_test
    container_name: mcp_test
    environment:
      API_URL: http://fake_api:8000
    depends_on:
      - fake_api
    ports:
      - "8082:8000"

  # =========================
  # INGEST / RAG API
  # =========================
  ingest_api:
    build: ./ingest_api
    container_name: ingest_api
    restart: unless-stopped
    depends_on:
      - alloydb
      - ollama
    volumes:
      - ./ingest_api:/app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: alloydb
      DB_NAME: agentdb
      DB_USER: agent
      DB_PASSWORD: agent123
      OLLAMA_URL: http://ollama:11434

  # =========================
  # DATABASE com suporte a vetores
  # =========================
  alloydb:
    build:
      context: ./alloydb
      args:
        OMNI_VERSION: "16.3.0"
    container_name: alloydb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
      POSTGRES_DB: agentdb
    volumes:
      - alloydb_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d agentdb" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # =========================
  # LLM + EMBEDDINGS (GPU)
  # =========================
  ollama:
    image: ollama/ollama:0.23.4
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"

  # =========================
  # OPENWEBUI (UI LLM)
  # =========================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    depends_on:
      - litellm
      - alloydb
    ports:
      - "8080:8080"
    environment:
      WEBUI_SECRET_KEY: "troque-esta-chave"
      ENABLE_OLLAMA_API: "False"
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: sk-1234 # Deve ser a mesma chave definida no LiteLLM
      DATABASE_URL: "postgresql://agent:agent123@alloydb:5432/openwebui"
      ENABLE_DIRECT_CONNECTIONS: "true"
    volumes:
      - openwebui_data:/app/backend/data

  # =========================
  # REDIS (cache / memory)
  # =========================
  redis:
    image: redis:8.8-m03-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # =========================
  # RABBITMQ (fila de jobs)
  # =========================
  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: agent
      RABBITMQ_DEFAULT_PASS: agent123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # =========================
  # n8n
  # =========================
  n8n:
    image: n8nio/n8n:2.20.7-exp.0
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

  litellm:
    build:
      context: ./litellm
      args:
        target: runtime
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm
    #########################################
    ## Uncomment these lines to start proxy with a config.yaml file ##
    # volumes:
    #  - ./config.yaml:/app/config.yaml
    # command:
    #  - "--config=/app/config.yaml"
    ##############################################
    ports:
      - "4000:4000" # Map the container port to the host, change the host port if necessary
    environment:
      DATABASE_URL: "postgresql://agent:agent123@alloydb:5432/litellm"
      LITELLM_MASTER_KEY: "sk-1234"
      LITELLM_SALT_KEY: "sk-1234"
      # Optional: route read-only queries (find_*, count, group_by, query_raw/_first)
      # to a separate reader endpoint, e.g. an Aurora reader. Leave unset for
      # single-DB deployments. With IAM_TOKEN_DB_AUTH enabled, the reader URL
      # is auto-refreshed alongside the writer.
      # DATABASE_URL_READ_REPLICA: "postgresql://llmproxy:dbpassword9090@db-reader:5432/litellm"
      STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
      REDIS_URL: "redis://redis:6379/0"

      LANGFUSE_PUBLIC_KEY: "pk-lf-1234567890"
      LANGFUSE_SECRET_KEY: "sk-lf-1234567890"
      LANGFUSE_HOST: "http://langfuse:3000"
    depends_on:
      - alloydb # Indicates that this service depends on the 'db' service, ensuring 'db' starts first
      - ollama # Indicates that this service depends on the 'ollama' service, ensuring 'ollama' starts first
    healthcheck:
      # Defines the health check configuration for the container
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" # Command to execute for health check
      interval: 30s # Perform health check every 30 seconds
      timeout: 10s # Health check command times out after 10 seconds
      retries: 3 # Retry up to 3 times if health check fails
      start_period: 40s # Wait 40 seconds after container start before beginning health checks

  prometheus:
    image: prom/prometheus:v3
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: always
  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: unless-stopped
    depends_on:
      alloydb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://agent:agent123@alloydb:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=uma_chave_muito_longa_e_aleatoria_com_mais_de_32_caracteres # CHANGEME
      - SALT=outro_segredo_aleatorio_para_criptografia # CHANGEME
      # Seed automático
      - LANGFUSE_INIT_ORG_ID=minha-org
      - LANGFUSE_INIT_ORG_NAME=MinhaOrg
      - LANGFUSE_INIT_PROJECT_ID=meu-projeto
      - LANGFUSE_INIT_PROJECT_NAME=MeuProjeto
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=pk-lf-1234567890
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=sk-lf-1234567890
      - LANGFUSE_INIT_USER_EMAIL=admin@admin.com
      - LANGFUSE_INIT_USER_NAME=admin
      - LANGFUSE_INIT_USER_PASSWORD=admin123 # CHANGEME
      - TELEMETRY_ENABLED=false
volumes:
  alloydb_data:
  ollama_data:
  openwebui_data:
  redis_data:
  rabbitmq_data:
  n8n_data:
  prometheus_data:
