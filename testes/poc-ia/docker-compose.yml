version: "3.9"

services:
  agent-gateway:
    build:
      context: ./agent-gateway
    container_name: agent-gateway
    restart: always
    depends_on:
      - ollama
      - alloydb
      - mcp-hub
      - n8n
    environment:
      OLLAMA_URL: http://ollama:11434
      MCP_URL: http://mcp-hub:8000
      N8N_URL: http://n8n:5678
      N8N_WEBHOOK: http://n8n:5678/webhook/agent
      DATABASE_URL: "postgresql://agent:agent123@alloydb:5432/agentdb"
      MODEL_NAME: qwen2.5:3b
    ports:
      - "8091:8000"

  # =========================
  # Uma API Fake para testes
  # =========================
  fake-api:
    build: ./fake-api
    container_name: fake-api
    depends_on:
      - alloydb
    ports:
      - "8081:8000"

  # =========================
  # MCP para interagir com a API Fake
  # =========================
  mcp-hub:
    build: ./mcp-hub
    container_name: mcp-hub
    environment:
      API_URL: http://fake-api:8000
    depends_on:
      - fake-api
    ports:
      - "8082:8000"

  # =========================
  # INGEST / RAG API
  # =========================
  ingest-api:
    build: ./ingest-api
    container_name: ingest-api
    restart: unless-stopped
    depends_on:
      - alloydb
      - ollama
    volumes:
      - ./ingest-api:/app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: alloydb
      DB_NAME: agentdb
      DB_USER: agent
      DB_PASSWORD: agent123
      OLLAMA_URL: http://ollama:11434

  # =========================
  # DATABASE com suporte a vetores
  # =========================
  alloydb:
    build:
      context: ./alloydb
      args:
        OMNI_VERSION: "16.3.0"
    container_name: alloydb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
      POSTGRES_DB: agentdb
    volumes:
      - alloydb_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d agentdb" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # =========================
  # LLM + EMBEDDINGS (GPU)
  # =========================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"

  # =========================
  # OPENWEBUI (UI LLM)
  # =========================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    depends_on:
      - ollama
      - alloydb
    ports:
      - "3000:8080"
    environment:
      WEBUI_SECRET_KEY: "troque-esta-chave"
      ENABLE_OLLAMA_API: "true"
      OLLAMA_BASE_URL: "http://ollama:11434"
      DATABASE_URL: "postgresql://agent:agent123@alloydb:5432/agentdb"
      ENABLE_DIRECT_CONNECTIONS: "true"
    volumes:
      - openwebui_data:/app/backend/data

  # =========================
  # REDIS (cache / memory)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # =========================
  # RABBITMQ (fila de jobs)
  # =========================
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: agent
      RABBITMQ_DEFAULT_PASS: agent123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # =========================
  # n8n
  # =========================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  alloydb_data:
  ollama_data:
  openwebui_data:
  redis_data:
  rabbitmq_data:
  n8n_data:
