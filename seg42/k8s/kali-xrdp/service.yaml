apiVersion: v1
kind: Service
metadata:
  name: kali-xrdp
  # namespace: user01-seg42 (Descomente se estiver usando namespace)
  labels:
    app: pod-kali-xrdp
spec:
  type: ClusterIP
  selector:
    app: pod-kali-xrdp
  ports:
  - name: "kali-rdp"
    port: 3389
    targetPort: 3389
  - name: "kali-ssh"
    port: 22
    targetPort: 22
