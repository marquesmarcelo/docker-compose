apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-misp-modules
  # namespace: user01-seg42
  labels:
    app: pod-misp-modules
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-misp-modules
  template:
    metadata:
      labels:
        app: pod-misp-modules
    spec:
      # nodeSelector:
        # kubernetes.io/hostname: ids-rj
      containers:
      - name: pod-misp-modules
        image: coolacid/misp-docker:modules-v2.4.176a
        env:
          - name: REDIS_BACKEND
            value: "redis"
          - name: REDIS_PORT
            value: "6379"
        ports:
          - containerPort: 6666
            protocol: TCP
